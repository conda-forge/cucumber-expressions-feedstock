{% set name = "cucumber-expressions" %}
{% set version = "19.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cucumber_expressions-{{ version }}.tar.gz
  sha256: 8eb5ae46dd03dd37fec1163ace1510529501d7d1868ff372c1ab2cd5aa4543a8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv-build >=0.9.0,<0.10.0
    - pip
  run:
    - python >={{ python_min }},<4.0

test:
  imports:
    - cucumber_expressions
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/cucumber/cucumber-expressions
  summary: Cucumber Expressions - a simpler alternative to Regular Expressions
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
